<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagrama de Caso de Uso — Guard Pets Intelligence</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6fb;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            min-height: 100vh;
        }
        h1 {
            font-size: 22px;
            color: #1a2340;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .subtitle {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 30px;
        }
        svg {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            max-width: 100%;
        }
        /* Actor */
        .actor-head { fill: #1a2340; }
        .actor-body { stroke: #1a2340; stroke-width: 2; fill: none; }
        .actor-label { font-size: 13px; fill: #1a2340; font-weight: 600; text-anchor: middle; }
        /* System boundary */
        .boundary { fill: #f0f4ff; stroke: #2a52be; stroke-width: 2; rx: 12; }
        .boundary-label { font-size: 15px; fill: #2a52be; font-weight: 700; text-anchor: middle; }
        /* Use case ellipses */
        .uc-public   { fill: #e8f5e9; stroke: #388e3c; stroke-width: 1.5; }
        .uc-agent    { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1.5; }
        .uc-admin    { fill: #fff3e0; stroke: #e65100; stroke-width: 1.5; }
        .uc-label    { font-size: 11.5px; fill: #1a2340; text-anchor: middle; dominant-baseline: middle; }
        /* Lines */
        .assoc  { stroke: #444; stroke-width: 1.5; fill: none; }
        .extend { stroke: #888; stroke-width: 1.2; stroke-dasharray: 5,3; fill: none; }
        .extend-label { font-size: 10px; fill: #888; text-anchor: middle; }
        /* Legend */
        .legend-title { font-size: 12px; font-weight: 700; fill: #1a2340; }
        .legend-text  { font-size: 11px; fill: #444; }
    </style>
</head>
<body>
    <h1>Diagrama de Caso de Uso</h1>
    <p class="subtitle">Guard Pets Intelligence — Sistema de Gerenciamento de Resgates e Adoções</p>

    <svg viewBox="0 0 960 680" width="960" height="680" xmlns="http://www.w3.org/2000/svg">

        <!-- ===== SYSTEM BOUNDARY ===== -->
        <rect x="180" y="40" width="590" height="590" rx="12"
              class="boundary" />
        <text x="475" y="70" class="boundary-label">Sistema Guard Pets Intelligence</text>

        <!-- ===== LEGEND ===== -->
        <rect x="800" y="50" width="145" height="130" rx="8"
              fill="#fff" stroke="#ccc" stroke-width="1" />
        <text x="873" y="72" class="legend-title">Legenda</text>
        <ellipse cx="820" cy="92" rx="14" ry="8" class="uc-public" />
        <text x="840" y="96" class="legend-text">Público</text>
        <ellipse cx="820" cy="114" rx="14" ry="8" class="uc-agent" />
        <text x="840" y="118" class="legend-text">Agente</text>
        <ellipse cx="820" cy="136" rx="14" ry="8" class="uc-admin" />
        <text x="840" y="140" class="legend-text">Admin</text>
        <line x1="813" y1="155" x2="833" y2="155" class="assoc" />
        <text x="840" y="159" class="legend-text">Associação</text>
        <line x1="813" y1="172" x2="833" y2="172" class="extend" />
        <text x="840" y="176" class="legend-text">&laquo;extend&raquo;</text>

        <!-- ===== ACTOR: VISITANTE ===== -->
        <!-- head -->
        <circle cx="80" cy="145" r="14" class="actor-head" />
        <!-- body -->
        <line x1="80" y1="159" x2="80" y2="205" class="actor-body" />
        <!-- arms -->
        <line x1="55" y1="175" x2="105" y2="175" class="actor-body" />
        <!-- legs -->
        <line x1="80" y1="205" x2="55" y2="235" class="actor-body" />
        <line x1="80" y1="205" x2="105" y2="235" class="actor-body" />
        <text x="80" y="252" class="actor-label">Visitante</text>

        <!-- ===== ACTOR: AGENTE ===== -->
        <circle cx="80" cy="370" r="14" class="actor-head" />
        <line x1="80" y1="384" x2="80" y2="430" class="actor-body" />
        <line x1="55" y1="400" x2="105" y2="400" class="actor-body" />
        <line x1="80" y1="430" x2="55" y2="460" class="actor-body" />
        <line x1="80" y1="430" x2="105" y2="460" class="actor-body" />
        <text x="80" y="477" class="actor-label">Agente</text>

        <!-- ===== ACTOR: ADMINISTRADOR ===== -->
        <circle cx="880" cy="310" r="14" class="actor-head" />
        <line x1="880" y1="324" x2="880" y2="370" class="actor-body" />
        <line x1="855" y1="340" x2="905" y2="340" class="actor-body" />
        <line x1="880" y1="370" x2="855" y2="400" class="actor-body" />
        <line x1="880" y1="370" x2="905" y2="400" class="actor-body" />
        <text x="880" y="417" class="actor-label">Admin</text>

        <!-- ===== USE CASES — PUBLIC (green) ===== -->
        <!-- UC1: Denunciar Maus-Tratos -->
        <ellipse cx="360" cy="130" rx="110" ry="28" class="uc-public" />
        <text x="360" y="130" class="uc-label">Denunciar Maus-Tratos</text>

        <!-- UC2: Visualizar Animais -->
        <ellipse cx="360" cy="205" rx="110" ry="28" class="uc-public" />
        <text x="360" y="205" class="uc-label">Visualizar Animais</text>

        <!-- UC3: Cadastrar-se -->
        <ellipse cx="360" cy="280" rx="110" ry="28" class="uc-public" />
        <text x="360" y="280" class="uc-label">Cadastrar-se</text>

        <!-- ===== USE CASES — AGENT (blue) ===== -->
        <!-- UC4: Fazer Login -->
        <ellipse cx="360" cy="370" rx="110" ry="28" class="uc-agent" />
        <text x="360" y="370" class="uc-label">Fazer Login</text>

        <!-- UC5: Registrar Ocorrência -->
        <ellipse cx="360" cy="445" rx="110" ry="28" class="uc-agent" />
        <text x="360" y="445" class="uc-label">Registrar Ocorrência</text>

        <!-- UC6: Consultar Status -->
        <ellipse cx="360" cy="520" rx="110" ry="28" class="uc-agent" />
        <text x="360" y="520" class="uc-label">Consultar Status</text>

        <!-- UC7: Agendar Adoção -->
        <ellipse cx="360" cy="595" rx="110" ry="28" class="uc-agent" />
        <text x="360" y="595" class="uc-label">Agendar Adoção</text>

        <!-- ===== USE CASES — ADMIN (orange) ===== -->
        <!-- UC8: Gerenciar Usuários -->
        <ellipse cx="620" cy="160" rx="110" ry="28" class="uc-admin" />
        <text x="620" y="160" class="uc-label">Gerenciar Usuários</text>

        <!-- UC9: Gerenciar Animais -->
        <ellipse cx="620" cy="250" rx="110" ry="28" class="uc-admin" />
        <text x="620" y="250" class="uc-label">Gerenciar Animais</text>

        <!-- UC10: Atualizar Status Ocorrência -->
        <ellipse cx="620" cy="340" rx="120" ry="28" class="uc-admin" />
        <text x="620" y="334" class="uc-label">Atualizar Status</text>
        <text x="620" y="348" class="uc-label">Ocorrência</text>

        <!-- UC11: Ver Relatórios -->
        <ellipse cx="620" cy="430" rx="110" ry="28" class="uc-admin" />
        <text x="620" y="430" class="uc-label">Ver Relatórios</text>

        <!-- ===== ASSOCIATIONS: VISITANTE ===== -->
        <line x1="94" y1="155" x2="250" y2="130" class="assoc" />
        <line x1="94" y1="165" x2="250" y2="205" class="assoc" />
        <line x1="94" y1="175" x2="250" y2="275" class="assoc" />

        <!-- ===== ASSOCIATIONS: AGENTE ===== -->
        <line x1="94" y1="378" x2="250" y2="370" class="assoc" />
        <line x1="94" y1="388" x2="250" y2="445" class="assoc" />
        <line x1="94" y1="395" x2="250" y2="520" class="assoc" />
        <line x1="94" y1="400" x2="250" y2="595" class="assoc" />

        <!-- ===== ASSOCIATIONS: ADMIN ===== -->
        <line x1="866" y1="318" x2="730" y2="160" class="assoc" />
        <line x1="868" y1="322" x2="730" y2="250" class="assoc" />
        <line x1="870" y1="328" x2="740" y2="340" class="assoc" />
        <line x1="868" y1="335" x2="730" y2="430" class="assoc" />

        <!-- ===== EXTEND: Agente extends Cadastrar-se ===== -->
        <line x1="360" y1="342" x2="360" y2="308" class="extend" />
        <text x="390" y="328" class="extend-label">«extend»</text>
        <!-- arrowhead -->
        <polygon points="360,308 355,320 365,320" fill="#888" />

    </svg>
</body>
</html>
